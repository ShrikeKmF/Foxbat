# ──────────────────────────────────────────────────────────────────────────────
# Foxbat — GitHub Actions Deploy Workflow (Linux + pm2)
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy Foxbat

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    environment: "Foxbat Deployment"
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Write .env file from secrets
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CLIENT_ID: ${{ vars.CLIENT_ID }}
          GUILD_ID: ${{ vars.GUILD_ID }}
          VOICE_CHANNEL_ID: ${{ vars.VOICE_CHANNEL_ID }}
          LOG_CHANNEL_ID: ${{ vars.LOG_CHANNEL_ID }}
          HR_CHANNEL_ID: ${{ vars.HR_CHANNEL_ID }}
          RTG_ORBAT_ID: ${{ vars.RTG_ORBAT_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          printf 'DISCORD_TOKEN=%s\n' "$DISCORD_TOKEN" > .env
          printf 'CLIENT_ID=%s\n' "$CLIENT_ID" >> .env
          printf 'GUILD_ID=%s\n' "$GUILD_ID" >> .env
          printf 'VOICE_CHANNEL_ID=%s\n' "$VOICE_CHANNEL_ID" >> .env
          printf 'LOG_CHANNEL_ID=%s\n' "$LOG_CHANNEL_ID" >> .env
          printf 'HR_CHANNEL_ID=%s\n' "$HR_CHANNEL_ID" >> .env
          printf 'RTG_ORBAT_ID=%s\n' "$RTG_ORBAT_ID" >> .env
          printf 'GOOGLE_CREDENTIALS_JSON=%s\n' "$GOOGLE_CREDENTIALS_JSON" >> .env

      - name: Restart bot with pm2
        run: |
          PM2=/home/shrike/.nvm/versions/node/v24.13.0/bin/pm2
          BOT=/home/shrike/actions-runner/_work/Foxbat/Foxbat/bot.js
          $PM2 describe foxbat > /dev/null 2>&1 \
            && $PM2 reload foxbat \
            || $PM2 start $BOT --name foxbat
          $PM2 save

      - name: Show pm2 status
        run: /home/shrike/.nvm/versions/node/v24.13.0/bin/pm2 show foxbat
