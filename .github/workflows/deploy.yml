# ──────────────────────────────────────────────────────────────────────────────
# Foxbat — GitHub Actions Deploy Workflow (Linux + pm2)
#
# Deploys to a self-hosted runner on your Linux machine.
#
# ONE-TIME SETUP:
#   1. Install pm2 globally:
#        npm install -g pm2
#   2. Install the GitHub Actions runner on your Linux machine:
#        GitHub repo → Settings → Actions → Runners → New self-hosted runner
#        Follow the Linux instructions, then start it as a service:
#        sudo ./svc.sh install && sudo ./svc.sh start
#   3. Add all secrets in: Settings → Secrets and variables → Actions
#
# REQUIRED SECRETS:
#   DISCORD_TOKEN, CLIENT_ID, GUILD_ID,
#   VOICE_CHANNEL_ID, LOG_CHANNEL_ID, HR_CHANNEL_ID,
#   RTG_ORBAT_ID, GOOGLE_CREDENTIALS_JSON
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy Foxbat

on:
  push:
    branches:
      - main          # Auto-deploy on push to main
  workflow_dispatch:  # Manual trigger from the Actions tab

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Write .env file from secrets
        run: |
          cat > .env << 'EOF'
          DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}
          CLIENT_ID=${{ secrets.CLIENT_ID }}
          GUILD_ID=${{ secrets.GUILD_ID }}
          VOICE_CHANNEL_ID=${{ secrets.VOICE_CHANNEL_ID }}
          LOG_CHANNEL_ID=${{ secrets.LOG_CHANNEL_ID }}
          HR_CHANNEL_ID=${{ secrets.HR_CHANNEL_ID }}
          RTG_ORBAT_ID=${{ secrets.RTG_ORBAT_ID }}
          GOOGLE_CREDENTIALS_JSON=${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          EOF

      - name: Restart bot with pm2
        run: |
          # If foxbat is already running, reload it (zero-downtime).
          # If it's not running yet, start it fresh.
          pm2 describe foxbat > /dev/null 2>&1 \
            && pm2 reload foxbat \
            || pm2 start bot.js --name foxbat

          # Save the pm2 process list so it survives a machine reboot
          pm2 save

      - name: Show pm2 status
        run: pm2 show foxbat